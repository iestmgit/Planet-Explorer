<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیاره‌کاو | Planet Explorer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- لودینگ -->
    <div id="loading">
        <div class="loader"></div>
        <p>در حال بارگذاری منظومه شمسی...</p>
    </div>

    <!-- UI -->
    <div id="ui">
        <header>
            <h1>🌌 سیاره‌کاو</h1>
            <p>کاوشگر منظومه شمسی</p>
        </header>
        
        <!-- پنل اطلاعات سیاره -->
        <div id="planet-info" class="hidden">
            <button id="close-info">✕</button>
            <h2 id="planet-name"></h2>
            <div id="planet-stats"></div>
            <p id="planet-desc"></p>
        </div>

        <!-- کنترل سرعت -->
        <div id="controls">
            <label>سرعت چرخش: <span id="speed-val">1x</span></label>
            <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
        </div>

        <!-- لیست سیارات -->
        <nav id="planet-list">
            <!-- با JS پر می‌شه -->
        </nav>
    </div>

    <!-- کانواس Three.js -->
    <canvas id="canvas"></canvas>

    <!-- کتابخانه‌ها -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <!-- اسکریپت‌های پروژه -->
    <script src="js/planets.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/controls.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
