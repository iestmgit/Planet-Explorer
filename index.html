<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیاره‌کاو | Planet Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Tahoma, Arial, sans-serif;
            background: #000011;
            color: #fff;
            overflow: hidden;
        }

        #canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        /* هدر */
        #header {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 10;
            text-align: right;
            pointer-events: none;
        }

        #header h1 {
            font-size: 28px;
            color: #64C8FF;
            text-shadow: 0 0 20px rgba(100,200,255,0.5);
        }

        #header p {
            font-size: 14px;
            color: #888;
            margin-top: 4px;
        }

        /* پنل اطلاعات */
        #info-panel {
            position: fixed;
            top: 50%; right: 20px;
            transform: translateY(-50%);
            width: 300px;
            background: rgba(0, 10, 30, 0.92);
            border: 1px solid rgba(100, 200, 255, 0.3);
            border-radius: 12px;
            padding: 20px;
            z-index: 10;
            display: none;
        }

        #info-panel.active { display: block; }

        #info-panel h2 {
            color: #64C8FF;
            font-size: 20px;
            margin-bottom: 8px;
        }

        #info-panel .en-name {
            color: #888;
            font-size: 12px;
            margin-bottom: 12px;
        }

        #info-panel .stat {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }

        #info-panel .stat span:first-child { color: #aaa; }
        #info-panel .stat span:last-child { color: #fff; }

        #info-panel .desc {
            margin-top: 12px;
            font-size: 13px;
            line-height: 1.6;
            color: #ccc;
        }

        #close-btn {
            position: absolute;
            top: 10px; left: 10px;
            background: none;
            border: none;
            color: #888;
            font-size: 18px;
            cursor: pointer;
        }

        #close-btn:hover { color: #fff; }

        /* لیست سیارات */
        #planet-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 6px;
            background: rgba(0, 10, 30, 0.9);
            padding: 10px 16px;
            border-radius: 30px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
        }

        .p-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-family: Tahoma, Arial, sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .p-btn:hover {
            background: rgba(100,200,255,0.3);
            border-color: rgba(100,200,255,0.5);
            transform: scale(1.05);
        }

        .p-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        /* کنترل سرعت */
        #speed-box {
            position: fixed;
            bottom: 80px;
            left: 20px;
            background: rgba(0, 10, 30, 0.9);
            padding: 12px 16px;
            border-radius: 10px;
            z-index: 10;
        }

        #speed-box label {
            font-size: 12px;
            color: #aaa;
        }

        #speed-box input {
            width: 120px;
            margin-right: 8px;
        }

        #speed-val {
            color: #64C8FF;
            font-size: 12px;
        }

        /* لودینگ */
        #loading {
            position: fixed;
            inset: 0;
            background: #000011;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(100,200,255,0.2);
            border-top-color: #64C8FF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #loading p {
            margin-top: 16px;
            color: #64C8FF;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- لودینگ -->
    <div id="loading">
        <div class="spinner"></div>
        <p>در حال بارگذاری منظومه شمسی...</p>
    </div>

    <!-- هدر -->
    <div id="header">
        <h1>🌌 سیاره‌کاو</h1>
        <p>کاوشگر منظومه شمسی</p>
    </div>

    <!-- پنل اطلاعات -->
    <div id="info-panel">
        <button id="close-btn">✕</button>
        <h2 id="p-name"></h2>
        <div class="en-name" id="p-en"></div>
        <div id="p-stats"></div>
        <div class="desc" id="p-desc"></div>
    </div>

    <!-- کنترل سرعت -->
    <div id="speed-box">
        <label>سرعت: <span id="speed-val">1x</span></label><br>
        <input type="range" id="speed" min="0" max="5" step="0.5" value="1">
    </div>

    <!-- لیست سیارات -->
    <div id="planet-bar"></div>

    <!-- کانواس -->
    <canvas id="canvas"></canvas>

    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ==================== داده سیارات ====================
        const PLANETS = {
            sun: {
                name: "خورشید", en: "Sun",
                r: 12, color: 0xFDB813,
                emissive: 0xFDB813, emissiveInt: 0.8,
                dist: 0, speed: 0, rotSpeed: 0.001,
                desc: "ستاره مرکزی منظومه شمسی. ۹۹.۸٪ جرم منظومه شمسی را دارد.",
                stats: { "قطر": "۱,۳۹۲,۷۰۰ کیلومتر", "دمای سطح": "۵,۵۰۰°C", "سن": "۴.۶ میلیارد سال" }
            },
            mercury: {
                name: "عطارد", en: "Mercury",
                r: 1.2, color: 0x8C8C8C,
                dist: 28, speed: 0.025, rotSpeed: 0.005,
                desc: "نزدیک‌ترین سیاره به خورشید. کوچک‌ترین سیاره منظومه شمسی.",
                stats: { "دوره چرخش": "۸۸ روز", "دمای روز": "۴۳۰°C", "دمای شب": "-۱۸۰°C" }
            },
            venus: {
                name: "زهره", en: "Venus",
                r: 2.4, color: 0xE6E6B8,
                dist: 42, speed: 0.018, rotSpeed: 0.002,
                desc: "گرم‌ترین سیاره به دلیل اثر گلخانه‌ای شدید.",
                stats: { "دمای سطح": "۴۶۲°C", "فشار جو": "۹۲ برابر زمین", "جهت چرخش": "معکوس!" }
            },
            earth: {
                name: "زمین", en: "Earth",
                r: 2.5, color: 0x2233FF,
                dist: 58, speed: 0.012, rotSpeed: 0.01,
                desc: "تنها سیاره شناخته‌شده با حیات. خانه ما!",
                stats: { "جمعیت": "۸ میلیارد", "ماه": "۱ عدد", "دمای میانگین": "۱۵°C" },
                hasMoon: true
            },
            mars: {
                name: "مریخ", en: "Mars",
                r: 1.8, color: 0xFF4500,
                dist: 76, speed: 0.009, rotSpeed: 0.009,
                desc: "سیاره سرخ. هدف اصلی اکتشافات فضایی آینده.",
                stats: { "روز": "۲۴.۶ ساعت", "کوه‌ها": "المپیک مونس", "قطب‌ها": "یخ خشک" }
            },
            jupiter: {
                name: "مشتری", en: "Jupiter",
                r: 7, color: 0xD4A373,
                dist: 105, speed: 0.005, rotSpeed: 0.02,
                desc: "بزرگ‌ترین سیاره. غول گازی با طوفان بزرگ قرمز.",
                stats: { "قطر": "۱۱ برابر زمین", "ماه‌ها": "۹۵ عدد", "چرخش": "سریع‌ترین" }
            },
            saturn: {
                name: "زحل", en: "Saturn",
                r: 6, color: 0xF4D03F,
                dist: 140, speed: 0.0035, rotSpeed: 0.018,
                desc: "زیباترین سیاره با حلقه‌های مشهورش.",
                stats: { "حلقه‌ها": "هزاران حلقه یخی", "چگالی": "کمتر از آب!", "ماه بزرگ": "تیتان" },
                hasRings: true
            },
            uranus: {
                name: "اورانوس", en: "Uranus",
                r: 4.2, color: 0x7DE3F4,
                dist: 175, speed: 0.0025, rotSpeed: 0.015,
                desc: "سیاره‌ای که روی جانب خود می‌چرخد!",
                stats: { "جهت چرخش": "۹۸ درجه کج", "سردترین": "-۲۲۴°C", "حلقه‌ها": "۱۳ حلقه تیره" }
            },
            neptune: {
                name: "نپتون", en: "Neptune",
                r: 4, color: 0x4169E1,
                dist: 210, speed: 0.0018, rotSpeed: 0.016,
                desc: "دورترین سیاره. بادهای ۲,۱۰۰ کیلومتر بر ساعت!",
                stats: { "سال": "۱۶۵ زمینی", "بادها": "سریع‌ترین", "رنگ": "آبی عمیق" }
            }
        };

        // ==================== صحنه ====================
        const canvas = document.getElementById('canvas');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000011, 0.0008);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 3000);
        camera.position.set(0, 60, 180);

        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;

        // کنترل
        let controls;
        try {
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.minDistance = 20;
            controls.maxDistance = 600;
        } catch (e) {
            console.log('OrbitControls not loaded, using basic camera');
        }

        // نور
        const sunLight = new THREE.PointLight(0xFFF5E1, 2, 600);
        sunLight.position.set(0, 0, 0);
        sunLight.castShadow = true;
        scene.add(sunLight);

        const ambient = new THREE.AmbientLight(0x111122, 0.4);
        scene.add(ambient);

        // ستاره‌ها
        const starsGeo = new THREE.BufferGeometry();
        const starCount = 10000;
        const starPos = new Float32Array(starCount * 3);
        const starColors = new Float32Array(starCount * 3);

        for (let i = 0; i < starCount; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 3000;
            starPos[i*3+1] = (Math.random() - 0.5) * 3000;
            starPos[i*3+2] = (Math.random() - 0.5) * 3000;

            const c = new THREE.Color();
            c.setHSL(Math.random() * 0.3 + 0.5, 0.3, Math.random() * 0.5 + 0.5);
            starColors[i*3] = c.r;
            starColors[i*3+1] = c.g;
            starColors[i*3+2] = c.b;
        }

        starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starsGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

        const starsMat = new THREE.PointsMaterial({
            size: 1.2, vertexColors: true,
            transparent: true, opacity: 0.8
        });
        const stars = new THREE.Points(starsGeo, starsMat);
        scene.add(stars);

        // ==================== ساخت سیارات ====================
        const planets = {};
        const orbits = [];
        let moonMesh = null;

        Object.keys(PLANETS).forEach(key => {
            const d = PLANETS[key];

            // گروه
            const group = new THREE.Group();

            // مش سیاره
            const geo = new THREE.SphereGeometry(d.r, 64, 64);
            const mat = new THREE.MeshStandardMaterial({
                color: d.color,
                emissive: d.emissive || 0x000000,
                emissiveIntensity: d.emissiveInt || 0,
                roughness: 0.7, metalness: 0.1
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.userData = { key, ...d };
            group.add(mesh);

            // glow خورشید
            if (key === 'sun') {
                [1.5, 2.2].forEach((s, i) => {
                    const g = new THREE.SphereGeometry(d.r * s, 32, 32);
                    const m = new THREE.MeshBasicMaterial({
                        color: i === 0 ? 0xFDB813 : 0xFF8800,
                        transparent: true, opacity: 0.2 - i * 0.1
                    });
                    mesh.add(new THREE.Mesh(g, m));
                });
            }

            // حلقه زحل
            if (d.hasRings) {
                const ringGeo = new THREE.RingGeometry(d.r * 1.3, d.r * 2.1, 64);
                const ringMat = new THREE.MeshBasicMaterial({
                    color: 0xC4A35A, side: THREE.DoubleSide,
                    transparent: true, opacity: 0.5
                });
                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2;
                mesh.add(ring);
            }

            // ماه زمین
            if (d.hasMoon) {
                const mGeo = new THREE.SphereGeometry(d.r * 0.27, 32, 32);
                const mMat = new THREE.MeshStandardMaterial({ color: 0xAAAAAA, roughness: 0.9 });
                moonMesh = new THREE.Mesh(mGeo, mMat);
                moonMesh.position.set(d.r * 4, 0, 0);
                group.add(moonMesh);
            }

            scene.add(group);
            planets[key] = { group, mesh, data: d, angle: Math.random() * Math.PI * 2 };

            // مدار
            if (d.dist > 0) {
                const orbitGeo = new THREE.RingGeometry(d.dist - 0.15, d.dist + 0.15, 128);
                const orbitMat = new THREE.MeshBasicMaterial({
                    color: 0x333355, side: THREE.DoubleSide,
                    transparent: true, opacity: 0.25
                });
                const orbit = new THREE.Mesh(orbitGeo, orbitMat);
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);
                orbits.push(orbit);
            }
        });

        // ==================== UI ====================
        const infoPanel = document.getElementById('info-panel');
        const planetBar = document.getElementById('planet-bar');

        // ساخت دکمه‌ها
        Object.keys(PLANETS).forEach(key => {
            const d = PLANETS[key];
            const btn = document.createElement('button');
            btn.className = 'p-btn';
            btn.innerHTML = `<span class="p-dot" style="background:#${d.color.toString(16).padStart(6,'0')}"></span>${d.name}`;
            btn.onclick = () => {
                focusPlanet(key);
                showInfo(key);
            };
            planetBar.appendChild(btn);
        });

        // بستن پنل
        document.getElementById('close-btn').onclick = () => {
            infoPanel.classList.remove('active');
        };

        // اسلایدر سرعت
        let speed = 1;
        document.getElementById('speed').oninput = (e) => {
            speed = parseFloat(e.target.value);
            document.getElementById('speed-val').textContent = speed + 'x';
        };

        function showInfo(key) {
            const d = PLANETS[key];
            document.getElementById('p-name').textContent = d.name;
            document.getElementById('p-en').textContent = d.en;
            document.getElementById('p-desc').textContent = d.desc;

            let statsHtml = '';
            Object.entries(d.stats).forEach(([k, v]) => {
                statsHtml += `<div class="stat"><span>${k}:</span><span>${v}</span></div>`;
            });
            document.getElementById('p-stats').innerHTML = statsHtml;
            infoPanel.classList.add('active');
        }

        function focusPlanet(key) {
            const p = planets[key];
            if (!p) return;

            const target = p.group.position.clone();
            const offset = p.data.r * 6;
            const end = new THREE.Vector3(target.x + offset, target.y + offset * 0.5, target.z + offset);

            let t = 0;
            const start = camera.position.clone();
            const startTarget = controls ? controls.target.clone() : new THREE.Vector3();

            function anim() {
                t += 0.03;
                if (t > 1) t = 1;
                camera.position.lerpVectors(start, end, t);
                if (controls) {
                    controls.target.lerp(target, 0.08);
                }
                if (t < 1) requestAnimationFrame(anim);
            }
            anim();
        }

        // کلیک روی سیاره
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        canvas.addEventListener('click', (e) => {
            if (e.target !== canvas) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const meshes = Object.values(planets).map(p => p.mesh);
            const hits = raycaster.intersectObjects(meshes);

            if (hits.length > 0) {
                const key = hits[0].object.userData.key;
                showInfo(key);
            }
        });

        // ==================== انیمیشن ====================
        let time = 0;

        function animate() {
            requestAnimationFrame(animate);
            time += 0.01 * speed;

            // ستاره‌ها
            stars.rotation.y += 0.00015;

            // سیارات
            Object.keys(planets).forEach(key => {
                const p = planets[key];
                const d = p.data;

                // چرخش محوری
                p.mesh.rotation.y += d.rotSpeed;

                // چرخش مداری
                if (d.dist > 0) {
                    p.angle += d.speed * speed * 0.1;
                    p.group.position.x = Math.cos(p.angle) * d.dist;
                    p.group.position.z = Math.sin(p.angle) * d.dist;
                }

                // ماه
                if (moonMesh && key === 'earth') {
                    const ma = time * 1.5;
                    moonMesh.position.x = Math.cos(ma) * d.r * 5;
                    moonMesh.position.z = Math.sin(ma) * d.r * 5;
                }
            });

            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        // resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // شروع
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
        }, 1200);

        animate();
    </script>
</body>
</html>
