<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیاره‌کاو واقعی | Planet Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Tahoma, Arial, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        #header {
            position: fixed; top: 16px; right: 16px; z-index: 10;
            text-align: right; pointer-events: none;
        }
        #header h1 { font-size: 22px; color: #FFD700; text-shadow: 0 0 15px rgba(255,215,0,0.4); }
        #header p { font-size: 12px; color: #888; margin-top: 2px; }

        #info {
            position: fixed; top: 50%; right: 16px;
            transform: translateY(-50%); width: 280px;
            background: rgba(0, 5, 15, 0.95);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 10px; padding: 16px; z-index: 10;
            display: none; backdrop-filter: blur(8px);
        }
        #info.active { display: block; }
        #info h2 { color: #FFD700; font-size: 18px; }
        #info .en { color: #666; font-size: 11px; margin-bottom: 10px; }
        #info .stat { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
        #info .stat span:first-child { color: #999; }
        #info .stat span:last-child { color: #fff; }
        #info .desc { margin-top: 10px; font-size: 12px; line-height: 1.5; color: #bbb; }
        #close { position: absolute; top: 8px; left: 8px; background: none; border: none; color: #666; cursor: pointer; font-size: 16px; }
        #close:hover { color: #fff; }

        #bar {
            position: fixed; bottom: 16px; left: 50%;
            transform: translateX(-50%); display: flex; gap: 4px;
            background: rgba(0, 5, 15, 0.9); padding: 8px 12px;
            border-radius: 24px; z-index: 10; flex-wrap: wrap; justify-content: center;
        }
        .btn {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
            color: #fff; padding: 5px 12px; border-radius: 16px;
            cursor: pointer; font-size: 11px; font-family: Tahoma, Arial, sans-serif;
            transition: all 0.2s; display: flex; align-items: center; gap: 5px;
        }
        .btn:hover, .btn.active { background: rgba(255,215,0,0.2); border-color: rgba(255,215,0,0.4); }
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

        #ctrl {
            position: fixed; bottom: 70px; left: 16px;
            background: rgba(0, 5, 15, 0.9); padding: 10px 14px;
            border-radius: 8px; z-index: 10;
        }
        #ctrl label { font-size: 11px; color: #888; display: block; margin-bottom: 4px; }
        #ctrl input { width: 100px; }
        #ctrl span { color: #FFD700; font-size: 11px; }

        #mode {
            position: fixed; top: 16px; left: 16px; z-index: 10;
            background: rgba(0, 5, 15, 0.9); padding: 8px 14px;
            border-radius: 8px; font-size: 11px; color: #888;
        }
        #mode span { color: #FFD700; }

        #load {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        .spin { width: 40px; height: 40px; border: 2px solid rgba(255,215,0,0.2); border-top-color: #FFD700; border-radius: 50%; animation: sp 1s linear infinite; }
        @keyframes sp { to { transform: rotate(360deg); } }
        #load p { margin-top: 12px; color: #FFD700; font-size: 12px; }
    </style>
</head>
<body>

    <div id="load"><div class="spin"></div><p>در حال ساخت منظومه شمسی...</p></div>

    <div id="header"><h1>🌌 سیاره‌کاو واقعی</h1><p>منظومه شمسی با مقیاس واقعی</p></div>

    <div id="mode">حالت: <span id="mode-text">آزاد</span></div>

    <div id="info">
        <button id="close">✕</button>
        <h2 id="n"></h2><div class="en" id="e"></div>
        <div id="s"></div><div class="desc" id="d"></div>
    </div>

    <div id="ctrl">
        <label>سرعت زمان: <span id="sv">1x</span></label>
        <input type="range" id="sp" min="0" max="10" step="0.5" value="1">
    </div>

    <div id="bar"></div>
    <canvas id="canvas"></canvas>

    <!-- Three.js از CDN رسمی -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <script>
        // ==================== OrbitControls Inline ====================
        // چون CDN کار نمی‌کرد، کلاس رو اینجا تعریف می‌کنیم
        (function() {
            const _changeEvent = { type: 'change' };
            const _startEvent = { type: 'start' };
            const _endEvent = { type: 'end' };

            const STATE = {
                NONE: -1,
                ROTATE: 0,
                DOLLY: 1,
                PAN: 2,
                TOUCH_ROTATE: 3,
                TOUCH_PAN: 4,
                TOUCH_DOLLY_PAN: 5,
                TOUCH_DOLLY_ROTATE: 6
            };

            class OrbitControls extends THREE.EventDispatcher {
                constructor(object, domElement) {
                    super();
                    this.object = object;
                    this.domElement = domElement;
                    this.domElement.style.touchAction = 'none';

                    this.enabled = true;
                    this.target = new THREE.Vector3();
                    this.minDistance = 0;
                    this.maxDistance = Infinity;
                    this.minZoom = 0;
                    this.maxZoom = Infinity;
                    this.minPolarAngle = 0;
                    this.maxPolarAngle = Math.PI;
                    this.minAzimuthAngle = -Infinity;
                    this.maxAzimuthAngle = Infinity;
                    this.enableDamping = false;
                    this.dampingFactor = 0.05;
                    this.enableZoom = true;
                    this.zoomSpeed = 1.0;
                    this.enableRotate = true;
                    this.rotateSpeed = 1.0;
                    this.enablePan = true;
                    this.panSpeed = 1.0;
                    this.screenSpacePanning = true;
                    this.keyPanSpeed = 7.0;
                    this.autoRotate = false;
                    this.autoRotateSpeed = 2.0;
                    this.keys = { LEFT: 'ArrowLeft', UP: 'ArrowUp', RIGHT: 'ArrowRight', BOTTOM: 'ArrowDown' };
                    this.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };
                    this.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

                    this.target0 = this.target.clone();
                    this.position0 = this.object.position.clone();
                    this.zoom0 = this.object.zoom;

                    this._domElementKeyEvents = null;

                    this.getPolarAngle = function() { return spherical.phi; };
                    this.getAzimuthalAngle = function() { return spherical.theta; };
                    this.getDistance = function() { return this.object.position.distanceTo(this.target); };
                    this.saveState = function() {
                        this.target0.copy(this.target);
                        this.position0.copy(this.object.position);
                        this.zoom0 = this.object.zoom;
                    };
                    this.reset = function() {
                        this.target.copy(this.target0);
                        this.object.position.copy(this.position0);
                        this.object.zoom = this.zoom0;
                        this.object.updateProjectionMatrix();
                        this.dispatchEvent(_changeEvent);
                        this.update();
                    };
                    this.update = (function() {
                        const offset = new THREE.Vector3();
                        const quat = new THREE.Quaternion().setFromUnitVectors(object.up, new THREE.Vector3(0, 1, 0));
                        const quatInverse = quat.clone().invert();
                        const lastPosition = new THREE.Vector3();
                        const lastQuaternion = new THREE.Quaternion();
                        const twoPI = 2 * Math.PI;

                        return function update() {
                            const position = scope.object.position;
                            offset.copy(position).sub(scope.target);
                            offset.applyQuaternion(quat);
                            spherical.setFromVector3(offset);

                            if (scope.autoRotate && state === STATE.NONE) {
                                rotateLeft(getAutoRotationAngle());
                            }

                            if (scope.enableDamping) {
                                spherical.theta += sphericalDelta.theta * scope.dampingFactor;
                                spherical.phi += sphericalDelta.phi * scope.dampingFactor;
                            } else {
                                spherical.theta += sphericalDelta.theta;
                                spherical.phi += sphericalDelta.phi;
                            }

                            let min = scope.minAzimuthAngle;
                            let max = scope.maxAzimuthAngle;

                            if (isFinite(min) && isFinite(max)) {
                                if (min < -Math.PI) min += twoPI; else if (min > Math.PI) min -= twoPI;
                                if (max < -Math.PI) max += twoPI; else if (max > Math.PI) max -= twoPI;
                                if (min <= max) {
                                    spherical.theta = Math.max(min, Math.min(max, spherical.theta));
                                } else {
                                    spherical.theta = (spherical.theta > (min + max) / 2) ? Math.max(min, spherical.theta) : Math.min(max, spherical.theta);
                                }
                            }

                            spherical.phi = Math.max(scope.minPolarAngle, Math.min(scope.maxPolarAngle, spherical.phi));
                            spherical.makeSafe();
                            spherical.radius *= scale;
                            spherical.radius = Math.max(scope.minDistance, Math.min(scope.maxDistance, spherical.radius));

                            if (scope.enableDamping === true) {
                                scope.target.addScaledVector(panOffset, scope.dampingFactor);
                            } else {
                                scope.target.add(panOffset);
                            }

                            offset.setFromSpherical(spherical);
                            offset.applyQuaternion(quatInverse);
                            position.copy(scope.target).add(offset);
                            scope.object.lookAt(scope.target);

                            if (scope.enableDamping === true) {
                                sphericalDelta.theta *= (1 - scope.dampingFactor);
                                sphericalDelta.phi *= (1 - scope.dampingFactor);
                                panOffset.multiplyScalar(1 - scope.dampingFactor);
                            } else {
                                sphericalDelta.set(0, 0, 0);
                                panOffset.set(0, 0, 0);
                            }

                            scale = 1;

                            if (zoomChanged ||
                                lastPosition.distanceToSquared(scope.object.position) > EPS ||
                                8 * (1 - lastQuaternion.dot(scope.object.quaternion)) > EPS) {
                                scope.dispatchEvent(_changeEvent);
                                lastPosition.copy(scope.object.position);
                                lastQuaternion.copy(scope.object.quaternion);
                                zoomChanged = false;
                                return true;
                            }
                            return false;
                        };
                    })();

                    this.dispose = function() {
                        scope.domElement.removeEventListener('contextmenu', onContextMenu);
                        scope.domElement.removeEventListener('pointerdown', onPointerDown);
                        scope.domElement.removeEventListener('pointercancel', onPointerCancel);
                        scope.domElement.removeEventListener('wheel', onMouseWheel);
                        scope._domElementKeyEvents?.removeEventListener('keydown', onKeyDown);
                    };

                    const scope = this;
                    const STATE = {
                        NONE: -1,
                        ROTATE: 0,
                        DOLLY: 1,
                        PAN: 2,
                        TOUCH_ROTATE: 3,
                        TOUCH_PAN: 4,
                        TOUCH_DOLLY_PAN: 5,
                        TOUCH_DOLLY_ROTATE: 6
                    };

                    let state = STATE.NONE;
                    const EPS = 0.000001;
                    const spherical = new THREE.Spherical();
                    const sphericalDelta = new THREE.Spherical();
                    let scale = 1;
                    const panOffset = new THREE.Vector3();
                    let zoomChanged = false;

                    const rotateStart = new THREE.Vector2();
                    const rotateEnd = new THREE.Vector2();
                    const rotateDelta = new THREE.Vector2();
                    const panStart = new THREE.Vector2();
                    const panEnd = new THREE.Vector2();
                    const panDelta = new THREE.Vector2();
                    const dollyStart = new THREE.Vector2();
                    const dollyEnd = new THREE.Vector2();
                    const dollyDelta = new THREE.Vector2();

                    const pointers = [];
                    const pointerPositions = {};

                    function getAutoRotationAngle() { return 2 * Math.PI / 60 / 60 * scope.autoRotateSpeed; }
                    function getZoomScale() { return Math.pow(0.95, scope.zoomSpeed); }
                    function rotateLeft(angle) { sphericalDelta.theta -= angle; }
                    function rotateUp(angle) { sphericalDelta.phi -= angle; }

                    const panLeft = (function() {
                        const v = new THREE.Vector3();
                        return function panLeft(distance, objectMatrix) {
                            v.setFromMatrixColumn(objectMatrix, 0);
                            v.multiplyScalar(-distance);
                            panOffset.add(v);
                        };
                    })();

                    const panUp = (function() {
                        const v = new THREE.Vector3();
                        return function panUp(distance, objectMatrix) {
                            if (scope.screenSpacePanning === true) {
                                v.setFromMatrixColumn(objectMatrix, 1);
                            } else {
                                v.setFromMatrixColumn(objectMatrix, 0);
                                v.crossVectors(scope.object.up, v);
                            }
                            v.multiplyScalar(distance);
                            panOffset.add(v);
                        };
                    })();

                    const pan = (function() {
                        const offset = new THREE.Vector3();
                        return function pan(deltaX, deltaY) {
                            const element = scope.domElement;
                            if (scope.object.isPerspectiveCamera) {
                                const position = scope.object.position;
                                offset.copy(position).sub(scope.target);
                                let targetDistance = offset.length();
                                targetDistance *= Math.tan((scope.object.fov / 2) * Math.PI / 180.0);
                                panLeft(2 * deltaX * targetDistance / element.clientHeight, scope.object.matrix);
                                panUp(2 * deltaY * targetDistance / element.clientHeight, scope.object.matrix);
                            } else if (scope.object.isOrthographicCamera) {
                                panLeft(deltaX * (scope.object.right - scope.object.left) / scope.object.zoom / element.clientWidth, scope.object.matrix);
                                panUp(deltaY * (scope.object.top - scope.object.bottom) / scope.object.zoom / element.clientHeight, scope.object.matrix);
                            } else {
                                console.warn('WARNING: OrbitControls.js encountered an unknown camera type - pan disabled.');
                                scope.enablePan = false;
                            }
                        };
                    })();

                    function dollyOut(dollyScale) {
                        if (scope.object.isPerspectiveCamera) { scale /= dollyScale; }
                        else if (scope.object.isOrthographicCamera) {
                            scope.object.zoom = Math.max(scope.minZoom, Math.min(scope.maxZoom, scope.object.zoom / dollyScale));
                            scope.object.updateProjectionMatrix();
                            zoomChanged = true;
                        } else {
                            console.warn('WARNING: OrbitControls.js encountered an unknown camera type - dolly/zoom disabled.');
                            scope.enableZoom = false;
                        }
                    }

                    function dollyIn(dollyScale) {
                        if (scope.object.isPerspectiveCamera) { scale *= dollyScale; }
                        else if (scope.object.isOrthographicCamera) {
                            scope.object.zoom = Math.max(scope.minZoom, Math.min(scope.maxZoom, scope.object.zoom * dollyScale));
                            scope.object.updateProjectionMatrix();
                            zoomChanged = true;
                        } else {
                            console.warn('WARNING: OrbitControls.js encountered an unknown camera type - dolly/zoom disabled.');
                            scope.enableZoom = false;
                        }
                    }

                    function handleMouseDownRotate(event) { rotateStart.set(event.clientX, event.clientY); }
                    function handleMouseDownDolly(event) { dollyStart.set(event.clientX, event.clientY); }
                    function handleMouseDownPan(event) { panStart.set(event.clientX, event.clientY); }

                    function handleMouseMoveRotate(event) {
                        rotateEnd.set(event.clientX, event.clientY);
                        rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(scope.rotateSpeed);
                        const element = scope.domElement;
                        rotateLeft(2 * Math.PI * rotateDelta.x / element.clientHeight);
                        rotateUp(2 * Math.PI * rotateDelta.y / element.clientHeight);
                        rotateStart.copy(rotateEnd);
                        scope.update();
                    }

                    function handleMouseMoveDolly(event) {
                        dollyEnd.set(event.clientX, event.clientY);
                        dollyDelta.subVectors(dollyEnd, dollyStart);
                        if (dollyDelta.y > 0) { dollyOut(getZoomScale()); }
                        else if (dollyDelta.y < 0) { dollyIn(getZoomScale()); }
                        dollyStart.copy(dollyEnd);
                        scope.update();
                    }

                    function handleMouseMovePan(event) {
                        panEnd.set(event.clientX, event.clientY);
                        panDelta.subVectors(panEnd, panStart).multiplyScalar(scope.panSpeed);
                        pan(panDelta.x, panDelta.y);
                        panStart.copy(panEnd);
                        scope.update();
                    }

                    function handleMouseWheel(event) {
                        if (event.deltaY < 0) { dollyIn(getZoomScale()); }
                        else if (event.deltaY > 0) { dollyOut(getZoomScale()); }
                        scope.update();
                    }

                    function handleKeyDown(event) {
                        let needsUpdate = false;
                        switch (event.code) {
                            case scope.keys.UP:
                                pan(0, scope.keyPanSpeed); needsUpdate = true; break;
                            case scope.keys.BOTTOM:
                                pan(0, -scope.keyPanSpeed); needsUpdate = true; break;
                            case scope.keys.LEFT:
                                pan(scope.keyPanSpeed, 0); needsUpdate = true; break;
                            case scope.keys.RIGHT:
                                pan(-scope.keyPanSpeed, 0); needsUpdate = true; break;
                        }
                        if (needsUpdate) { event.preventDefault(); scope.update(); }
                    }

                    function handleTouchStartRotate() {
                        if (pointers.length === 1) { rotateStart.set(pointers[0].pageX, pointers[0].pageY); }
                        else {
                            const x = 0.5 * (pointers[0].pageX + pointers[1].pageX);
                            const y = 0.5 * (pointers[0].pageY + pointers[1].pageY);
                            rotateStart.set(x, y);
                        }
                    }

                    function handleTouchStartPan() {
                        if (pointers.length === 1) { panStart.set(pointers[0].pageX, pointers[0].pageY); }
                        else {
                            const x = 0.5 * (pointers[0].pageX + pointers[1].pageX);
                            const y = 0.5 * (pointers[0].pageY + pointers[1].pageY);
                            panStart.set(x, y);
                        }
                    }

                    function handleTouchStartDolly() {
                        const dx = pointers[0].pageX - pointers[1].pageX;
                        const dy = pointers[0].pageY - pointers[1].pageY;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        dollyStart.set(0, distance);
                    }

                    function handleTouchStartDollyPan() {
                        if (scope.enableZoom) handleTouchStartDolly();
                        if (scope.enablePan) handleTouchStartPan();
                    }

                    function handleTouchStartDollyRotate() {
                        if (scope.enableZoom) handleTouchStartDolly();
                        if (scope.enableRotate) handleTouchStartRotate();
                    }

                    function handleTouchMoveRotate(event) {
                        if (pointers.length == 1) { rotateEnd.set(event.pageX, event.pageY); }
                        else {
                            const position = getSecondPointerPosition(event);
                            const x = 0.5 * (event.pageX + position.x);
                            const y = 0.5 * (event.pageY + position.y);
                            rotateEnd.set(x, y);
                        }
                        rotateDelta.subVectors(rotateEnd, rotateStart).multiplyScalar(scope.rotateSpeed);
                        const element = scope.domElement;
                        rotateLeft(2 * Math.PI * rotateDelta.x / element.clientHeight);
                        rotateUp(2 * Math.PI * rotateDelta.y / element.clientHeight);
                        rotateStart.copy(rotateEnd);
                    }

                    function handleTouchMovePan(event) {
                        if (pointers.length === 1) { panEnd.set(event.pageX, event.pageY); }
                        else {
                            const position = getSecondPointerPosition(event);
                            const x = 0.5 * (event.pageX + position.x);
                            const y = 0.5 * (event.pageY + position.y);
                            panEnd.set(x, y);
                        }
                        panDelta.subVectors(panEnd, panStart).multiplyScalar(scope.panSpeed);
                        pan(panDelta.x, panDelta.y);
                        panStart.copy(panEnd);
                    }

                    function handleTouchMoveDolly(event) {
                        const position = getSecondPointerPosition(event);
                        const dx = event.pageX - position.x;
                        const dy = event.pageY - position.y;
                        const distance = Math.sqrt(dx * dx + dy * dy);
                        dollyEnd.set(0, distance);
                        dollyDelta.set(0, Math.pow(dollyEnd.y / dollyStart.y, scope.zoomSpeed));
                        dollyOut(dollyDelta.y);
                        dollyStart.copy(dollyEnd);
                    }

                    function handleTouchMoveDollyPan(event) {
                        if (scope.enableZoom) handleTouchMoveDolly(event);
                        if (scope.enablePan) handleTouchMovePan(event);
                    }

                    function handleTouchMoveDollyRotate(event) {
                        if (scope.enableZoom) handleTouchMoveDolly(event);
                        if (scope.enableRotate) handleTouchMoveRotate(event);
                    }

                    function onPointerDown(event) {
                        if (scope.enabled === false) return;
                        switch (event.pointerType) {
                            case 'mouse':
                            case 'pen':
                                onMouseDown(event); break;
                            case 'touch':
                                onTouchStart(event); break;
                        }
                    }

                    function onMouseDown(event) {
                        let mouseAction;
                        switch (event.button) {
                            case 0: mouseAction = scope.mouseButtons.LEFT; break;
                            case 1: mouseAction = scope.mouseButtons.MIDDLE; break;
                            case 2: mouseAction = scope.mouseButtons.RIGHT; break;
                            default: mouseAction = -1;
                        }
                        switch (mouseAction) {
                            case THREE.MOUSE.DOLLY:
                                if (scope.enableZoom === false) return;
                                handleMouseDownDolly(event);
                                state = STATE.DOLLY;
                                break;
                            case THREE.MOUSE.ROTATE:
                                if (event.ctrlKey || event.metaKey || event.shiftKey) {
                                    if (scope.enablePan === false) return;
                                    handleMouseDownPan(event);
                                    state = STATE.PAN;
                                } else {
                                    if (scope.enableRotate === false) return;
                                    handleMouseDownRotate(event);
                                    state = STATE.ROTATE;
                                }
                                break;
                            case THREE.MOUSE.PAN:
                                if (event.ctrlKey || event.metaKey || event.shiftKey) {
                                    if (scope.enableRotate === false) return;
                                    handleMouseDownRotate(event);
                                    state = STATE.ROTATE;
                                } else {
                                    if (scope.enablePan === false) return;
                                    handleMouseDownPan(event);
                                    state = STATE.PAN;
                                }
                                break;
                            default: state = STATE.NONE;
                        }
                        if (state !== STATE.NONE) {
                            scope.domElement.setPointerCapture(event.pointerId);
                            scope.dispatchEvent(_startEvent);
                        }
                    }

                    function onTouchStart(event) {
                        trackPointer(event);
                        switch (pointers.length) {
                            case 1:
                                switch (scope.touches.ONE) {
                                    case THREE.TOUCH.ROTATE:
                                        if (scope.enableRotate === false) return;
                                        handleTouchStartRotate();
                                        state = STATE.TOUCH_ROTATE;
                                        break;
                                    case THREE.TOUCH.PAN:
                                        if (scope.enablePan === false) return;
                                        handleTouchStartPan();
                                        state = STATE.TOUCH_PAN;
                                        break;
                                    default: state = STATE.NONE;
                                }
                                break;
                            case 2:
                                switch (scope.touches.TWO) {
                                    case THREE.TOUCH.DOLLY_PAN:
                                        if (scope.enableZoom === false && scope.enablePan === false) return;
                                        handleTouchStartDollyPan();
                                        state = STATE.TOUCH_DOLLY_PAN;
                                        break;
                                    case THREE.TOUCH.DOLLY_ROTATE:
                                        if (scope.enableZoom === false && scope.enableRotate === false) return;
                                        handleTouchStartDollyRotate();
                                        state = STATE.TOUCH_DOLLY_ROTATE;
                                        break;
                                    default: state = STATE.NONE;
                                }
                                break;
                            default: state = STATE.NONE;
                        }
                        if (state !== STATE.NONE) {
                            scope.dispatchEvent(_startEvent);
                        }
                    }

                    function onPointerMove(event) {
                        if (scope.enabled === false) return;
                        switch (event.pointerType) {
                            case 'mouse':
                            case 'pen':
                                onMouseMove(event); break;
                            case 'touch':
                                onTouchMove(event); break;
                        }
                    }

                    function onMouseMove(event) {
                        switch (state) {
                            case STATE.ROTATE:
                                if (scope.enableRotate === false) return;
                                handleMouseMoveRotate(event);
                                break;
                            case STATE.DOLLY:
                                if (scope.enableZoom === false) return;
                                handleMouseMoveDolly(event);
                                break;
                            case STATE.PAN:
                                if (scope.enablePan === false) return;
                                handleMouseMovePan(event);
                                break;
                        }
                    }

                    function onTouchMove(event) {
                        trackPointer(event);
                        switch (state) {
                            case STATE.TOUCH_ROTATE:
                                if (scope.enableRotate === false) return;
                                handleTouchMoveRotate(event);
                                scope.update();
                                break;
                            case STATE.TOUCH_PAN:
                                if (scope.enablePan === false) return;
                                handleTouchMovePan(event);
                                scope.update();
                                break;
                            case STATE.TOUCH_DOLLY_PAN:
                                if (scope.enableZoom === false && scope.enablePan === false) return;
                                handleTouchMoveDollyPan(event);
                                scope.update();
                                break;
                            case STATE.TOUCH_DOLLY_ROTATE:
                                if (scope.enableZoom === false && scope.enableRotate === false) return;
                                handleTouchMoveDollyRotate(event);
                                scope.update();
                                break;
                            default: state = STATE.NONE;
                        }
                    }

                    function onPointerUp(event) {
                        removePointer(event);
                        if (pointers.length === 0) {
                            scope.domElement.releasePointerCapture(event.pointerId);
                            scope.dispatchEvent(_endEvent);
                            state = STATE.NONE;
                        }
                    }

                    function onPointerCancel(event) {
                        removePointer(event);
                    }

                    function onMouseWheel(event) {
                        if (scope.enabled === false || scope.enableZoom === false || state !== STATE.NONE) return;
                        event.preventDefault();
                        scope.dispatchEvent(_startEvent);
                        handleMouseWheel(event);
                        scope.dispatchEvent(_endEvent);
                    }

                    function onKeyDown(event) {
                        if (scope.enabled === false || scope.enablePan === false) return;
                        handleKeyDown(event);
                    }

                    function onContextMenu(event) {
                        if (scope.enabled === false) return;
                        event.preventDefault();
                    }

                    function addPointer(event) {
                        pointers.push(event);
                    }

                    function removePointer(event) {
                        delete pointerPositions[event.pointerId];
                        for (let i = 0; i < pointers.length; i++) {
                            if (pointers[i].pointerId == event.pointerId) {
                                pointers.splice(i, 1);
                                return;
                            }
                        }
                    }

                    function trackPointer(event) {
                        let position = pointerPositions[event.pointerId];
                        if (position === undefined) {
                            position = new THREE.Vector2();
                            pointerPositions[event.pointerId] = position;
                        }
                        position.set(event.pageX, event.pageY);
                    }

                    function getSecondPointerPosition(event) {
                        const pointer = (event.pointerId === pointers[0].pointerId) ? pointers[1] : pointers[0];
                        return pointerPositions[pointer.pointerId];
                    }

                    scope.domElement.addEventListener('contextmenu', onContextMenu);
                    scope.domElement.addEventListener('pointerdown', onPointerDown);
                    scope.domElement.addEventListener('pointermove', onPointerMove);
                    scope.domElement.addEventListener('pointerup', onPointerUp);
                    scope.domElement.addEventListener('pointercancel', onPointerCancel);
                    scope.domElement.addEventListener('wheel', onMouseWheel, { passive: false });

                    scope.update();
                }
            }

        // ==================== صحنه Three.js ====================

        // ستاره‌ها
        function createStars() {
            const geo = new THREE.BufferGeometry();
            const count = 12000;
            const pos = new Float32Array(count * 3);
            const colors = new Float32Array(count * 3);

            for (let i = 0; i < count; i++) {
                const r = 1200 + Math.random() * 2500;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);

                pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
                pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                pos[i*3+2] = r * Math.cos(phi);

                const temp = Math.random();
                const c = new THREE.Color();
                if (temp < 0.15) c.setHSL(0.6, 0.8, 0.7);
                else if (temp < 0.4) c.setHSL(0.1, 0.5, 0.9);
                else c.setHSL(0, 0, Math.random() * 0.4 + 0.6);

                colors[i*3] = c.r;
                colors[i*3+1] = c.g;
                colors[i*3+2] = c.b;
            }

            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const mat = new THREE.PointsMaterial({
                size: 1.2, vertexColors: true,
                transparent: true, opacity: 0.85,
                sizeAttenuation: true
            });

            return new THREE.Points(geo, mat);
        }

        const stars = createStars();

        // ==================== تکسچر‌ها ====================
        function createEarthTex() {
            const c = document.createElement('canvas');
            c.width = 512; c.height = 256;
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#1a5a8a';
            ctx.fillRect(0, 0, 512, 256);
            ctx.fillStyle = '#2d6a1e';
            for (let i = 0; i < 25; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * 512, Math.random() * 256, Math.random() * 50 + 15, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            for (let i = 0; i < 40; i++) {
                ctx.beginPath();
                ctx.arc(Math.random() * 512, Math.random() * 256, Math.random() * 35 + 8, 0, Math.PI * 2);
                ctx.fill();
            }
            return new THREE.CanvasTexture(c);
        }

        function createJupiterTex() {
            const c = document.createElement('canvas');
            c.width = 512; c.height = 256;
            const ctx = c.getContext('2d');
            const bands = ['#c4a060','#d4b070','#a08050','#c9a070','#8b7050','#c4a060','#d4b070'];
            let y = 0;
            bands.forEach((col, i) => {
                const h = 36 + (i % 2) * 2;
                ctx.fillStyle = col;
                ctx.fillRect(0, y, 512, h);
                y += h;
            });
            ctx.fillStyle = '#8B3A3A';
            ctx.beginPath();
            ctx.ellipse(350, 130, 22, 14, 0, 0, Math.PI * 2);
            ctx.fill();
            return new THREE.CanvasTexture(c);
        }

        // ==================== ساخت سیارات ====================
        const planets = {};
        let moonMesh = null;
        let activePlanet = null;

        Object.keys(DATA).forEach(key => {
            const d = DATA[key];
            const group = new THREE.Group();

            const geo = new THREE.SphereGeometry(d.radius, 64, 64);

            let mat;
            if (key === 'earth') {
                mat = new THREE.MeshStandardMaterial({ map: createEarthTex(), roughness: 0.6, metalness: 0.1 });
            } else if (key === 'jupiter') {
                mat = new THREE.MeshStandardMaterial({ map: createJupiterTex(), roughness: 0.7 });
            } else {
                mat = new THREE.MeshStandardMaterial({
                    color: d.color,
                    emissive: d.emissive || 0x000000,
                    emissiveIntensity: d.emissiveInt || 0,
                    roughness: key === 'sun' ? 1 : 0.8,
                    metalness: key === 'sun' ? 0 : 0.1
                });
            }

            const mesh = new THREE.Mesh(geo, mat);
            if (key !== 'sun') {
                mesh.castShadow = true;
                mesh.receiveShadow = true;
            }
            mesh.userData = { key, ...d };
            group.add(mesh);

            // کرونای خورشید

                [1.4, 2.0].forEach((s, i) => {
                    const g = new THREE.SphereGeometry(d.radius * s, 32, 32);
                    const m = new THREE.MeshBasicMaterial({
                        color: i === 0 ? 0xFFAA00 : 0xFF6600,

                    mesh.add(new THREE.Mesh(g, m));

            // حلقه زحل

                const ringGeo = new THREE.RingGeometry(d.radius * 1.3, d.radius * 2.0, 128);

                    color: 0xC4A35A, side: THREE.DoubleSide,

                    roughness: 0.9
                });

                const ring2Geo = new THREE.RingGeometry(d.radius * 2.1, d.radius * 2.3, 128);

                });

            // ماه

                const mGeo = new THREE.SphereGeometry(d.radius * 0.27, 32, 32);
                const mMat = new THREE.MeshStandardMaterial({ color: 0xAAAAAA, roughness: 0.95 });
                moonMesh = new THREE.Mesh(mGeo, mMat);
                moonMesh.castShadow = true;
                moonMesh.receiveShadow = true;
                group.add(moonMesh);
            }

            // اتمسفر زمین
            if (key === 'earth') {
                const atmGeo = new THREE.SphereGeometry(d.radius * 1.04, 32, 32);
                const atmMat = new THREE.MeshBasicMaterial({
                    color: 0x87CEEB, transparent: true, opacity: 0.12,
                    side: THREE.BackSide
                });
                mesh.add(new THREE.Mesh(atmGeo, atmMat));
            }

            scene.add(group);

            planets[key] = {
                group, mesh, data: d,
                angle: Math.random() * Math.PI * 2,
                axialTilt: key === 'earth' ? 23.5 * Math.PI / 180 :
                           key === 'mars' ? 25.2 * Math.PI / 180 :
                           key === 'saturn' ? 26.7 * Math.PI / 180 :
                           key === 'uranus' ? 97.8 * Math.PI / 180 : 0
            };

            if (planets[key].axialTilt) {
                mesh.rotation.z = planets[key].axialTilt;
            }

            // مدار
            if (d.distance > 0) {
                const orbitGeo = new THREE.RingGeometry(d.distance - 0.15, d.distance + 0.15, 256);
                const orbitMat = new THREE.MeshBasicMaterial({
                    color: 0x222244, side: THREE.DoubleSide,
                    transparent: true, opacity: 0.18
                });
                const orbit = new THREE.Mesh(orbitGeo, orbitMat);
                orbit.rotation.x = Math.PI / 2;
                scene.add(orbit);

        // ==================== UI ====================
        const info = document.getElementById('info');
        const bar = document.getElementById('bar');

        Object.keys(DATA).forEach(key => {
            const d = DATA[key];

        function selectPlanet(key) {
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + key).classList.add('active');
            activePlanet = key;
            modeText.textContent = key === 'sun' ? 'روی خورشید' : 'روی ' + DATA[key].name;
            showInfo(key);
        }

        function showInfo(key) {
            const d = DATA[key];
            document.getElementById('n').textContent = d.name;
            document.getElementById('e').textContent = d.en;
            document.getElementById('d').textContent = d.desc;

            let html = '';
            Object.entries(d.stats).forEach(([k, v]) => {
                html += `<div class="stat"><span>${k}:</span><span>${v}</span></div>`;
            });
            html += `<div class="stat"><span>فاصله نمایشی:</span><span>${d.distance} واحد</span></div>`;
            if (d.period > 0) {
                html += `<div class="stat"><span>دوره مداری:</span><span>${d.period} روز</span></div>`;
            }
            document.getElementById('s').innerHTML = html;
            info.classList.add('active');
        }

        document.getElementById('close').onclick = () => {
            info.classList.remove('active');
        };

        let timeSpeed = 1;
        document.getElementById('sp').oninput = (e) => {
            timeSpeed = parseFloat(e.target.value);
            const labels = ['ایستا', 'کند', 'عادی', 'سریع', 'خیلی سریع', 'فوق‌سریع'];
            const idx = Math.min(Math.floor(timeSpeed / 2), 5);
            document.getElementById('sv').textContent = timeSpeed + 'x (' + labels[idx] + ')';
        };

        // کلیک روی سیاره
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        canvas.addEventListener('click', (e) => {
            if (e.target !== canvas) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const meshes = Object.values(planets).map(p => p.mesh);
            const hits = raycaster.intersectObjects(meshes);

            if (hits.length > 0) {
                selectPlanet(hits[0].object.userData.key);
            }
        });

        // ==================== انیمیشن ====================
        let time = 0;
        const clock = new THREE.Clock();

        function updateCamera() {
            if (!activePlanet) {
                if (controls) controls.update();
                return;
            }

            const p = planets[activePlanet];
            const worldPos = new THREE.Vector3();
            p.mesh.getWorldPosition(worldPos);

            if (activePlanet === 'sun') {
                const t = time * 0.05;
                camera.position.x = Math.cos(t) * 50;
                camera.position.z = Math.sin(t) * 50;
                camera.position.y = 25;
                camera.lookAt(0, 0, 0);
                return;
            }

            const offset = p.data.radius * 6;
            const targetPos = worldPos.clone();

            // فاصله دوربین از سیاره
            const currentOffset = camera.position.clone().sub(targetPos);
            const distance = currentOffset.length();

            if (distance < offset * 0.5 || distance > offset * 3) {
                // تنظیم مجدد فاصله
                const idealDist = offset;
                currentOffset.normalize().multiplyScalar(idealDist);
                camera.position.lerp(targetPos.clone().add(currentOffset), 0.03);
            }

            if (controls) {
                controls.target.lerp(targetPos, 0.05);
                controls.update();
            } else {
                camera.lookAt(targetPos);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            time += delta * timeSpeed;

            stars.rotation.y += 0.00002 * timeSpeed;

            Object.keys(planets).forEach(key => {
                const p = planets[key];
                const d = p.data;

                // چرخش محوری
                const rotSpeed = d.dayLength > 0 ? (24 / d.dayLength) * 0.001 : 0;
                p.mesh.rotation.y += rotSpeed * timeSpeed;

                // چرخش مداری
                if (d.distance > 0 && d.period > 0) {
                    const orbitalSpeed = (2 * Math.PI / d.period) * 0.01;
                    p.angle += orbitalSpeed * timeSpeed;

                    p.group.position.x = Math.cos(p.angle) * d.distance;
                    p.group.position.z = Math.sin(p.angle) * d.distance;
                }

                // ماه
                if (moonMesh && key === 'earth') {
                    const moonAngle = time * 0.1;
                    const moonDist = d.radius * 5;
                    moonMesh.position.x = Math.cos(moonAngle) * moonDist;
                    moonMesh.position.z = Math.sin(moonAngle) * moonDist;
                    moonMesh.rotation.y += 0.001 * timeSpeed;
                }
            });

            updateCamera();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // شروع
        setTimeout(() => {
            document.getElementById('load').style.display = 'none';
            selectPlanet('earth');
        }, 1200);

        animate();
